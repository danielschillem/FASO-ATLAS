services:
  # ── API Go ──────────────────────────────────────────────
  - type: web
    name: faso-atlas-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: frankfurt
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: faso-atlas-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: faso-atlas-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: WEB_URL
        value: https://faso-atlas.netlify.app
      - key: CLOUDINARY_URL
        value: disabled

  # ── Redis ───────────────────────────────────────────────
  - type: redis
    name: faso-atlas-redis
    region: frankfurt
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  # ── PostgreSQL ──────────────────────────────────────────
  - name: faso-atlas-db
    region: frankfurt
    plan: basic-256mb
    databaseName: faso_atlas
    postgresMajorVersion: "16"
    ipAllowList: []
