openapi: 3.0.3
info:
  title: Faso Atlas API
  version: 1.1.0
  description: |
    Contrat API principal pour les clients web et mobile.
    Base path: /api/v1
servers:
  - url: http://localhost:8080
    description: Local
  - url: https://faso-atlas-api.onrender.com
    description: Production

tags:
  - name: System
  - name: Auth
  - name: Map
  - name: Destinations
  - name: Establishments
  - name: Itineraries
  - name: Reservations
  - name: Reviews
  - name: Favorites
  - name: Payments
  - name: Search
  - name: Stats

paths:
  /health:
    get:
      tags: [System]
      summary: Liveness probe
      operationId: getHealth
      responses:
        "200":
          description: API alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      tags: [System]
      summary: Readiness probe (PostgreSQL + Redis)
      operationId: getReadiness
      responses:
        "200":
          description: Dependencies are ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
        "503":
          description: One or more dependencies are unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"

  /metrics:
    get:
      tags: [System]
      summary: Prometheus metrics endpoint
      operationId: getMetrics
      responses:
        "200":
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string

  /openapi.yaml:
    get:
      tags: [System]
      summary: OpenAPI contract document
      operationId: getOpenApiYaml
      responses:
        "200":
          description: OpenAPI file
          content:
            application/yaml:
              schema:
                type: string

  /version:
    get:
      tags: [System]
      summary: Runtime build information
      operationId: getVersion
      responses:
        "200":
          description: API version and build metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"

  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Create a new user account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Authenticate user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/destinations:
    get:
      tags: [Destinations]
      summary: List destinations
      operationId: listDestinations
      responses:
        "200":
          description: Destination list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Destination"

  /api/v1/destinations/{slug}:
    get:
      tags: [Destinations]
      summary: Get one destination by slug
      operationId: getDestination
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Destination details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Destination"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/map/places:
    get:
      tags: [Map]
      summary: List map places
      operationId: listMapPlaces
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [site, hotel, nature, culture]
        - in: query
          name: region_id
          schema:
            type: string
      responses:
        "200":
          description: Place list for the interactive map
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Place"

  /api/v1/map/places/{id}:
    get:
      tags: [Map]
      summary: Get one map place
      operationId: getMapPlace
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Place details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Place"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/map/regions:
    get:
      tags: [Map]
      summary: List available regions
      operationId: listRegions
      responses:
        "200":
          description: Region list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Region"

  /api/v1/establishments:
    get:
      tags: [Establishments]
      summary: List establishments
      operationId: listEstablishments
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - in: query
          name: type
          schema:
            type: string
            enum: [hotel, restaurant, gite, camp]
        - in: query
          name: stars
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - in: query
          name: region_id
          schema:
            type: string
      responses:
        "200":
          description: Paginated establishment list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedEstablishmentsResponse"

  /api/v1/establishments/{id}:
    get:
      tags: [Establishments]
      summary: Get one establishment
      operationId: getEstablishment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Establishment details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Establishment"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/favorites:
    get:
      tags: [Favorites]
      summary: List current user favorites
      operationId: listFavorites
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [place, itinerary]
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Favorite list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoritesListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/favorites/toggle:
    post:
      tags: [Favorites]
      summary: Add or remove a favorite
      operationId: toggleFavorite
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteToggleRequest"
      responses:
        "200":
          description: Favorite removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteStatusResponse"
        "201":
          description: Favorite created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/favorites/check/{targetId}:
    get:
      tags: [Favorites]
      summary: Check whether a target is favorited
      operationId: checkFavorite
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: targetId
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: type
          schema:
            type: string
            enum: [place, itinerary]
      responses:
        "200":
          description: Favorite status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FavoriteStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/reservations:
    post:
      tags: [Reservations]
      summary: Create a reservation
      operationId: createReservation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReservationRequest"
      responses:
        "201":
          description: Reservation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      tags: [Reservations]
      summary: List current user reservations
      operationId: listMyReservations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reservation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/reservations/me:
    get:
      tags: [Reservations]
      summary: List current user reservations (explicit endpoint)
      operationId: listMyReservationsExplicit
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reservation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/reservations/owner:
    get:
      tags: [Reservations]
      summary: List reservations for owner/admin-managed establishments
      operationId: listOwnerReservations
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Reservation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/reservations/{id}:
    get:
      tags: [Reservations]
      summary: Get reservation by ID
      operationId: getReservation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Reservation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/reservations/{id}/cancel:
    put:
      tags: [Reservations]
      summary: Cancel a reservation
      operationId: cancelReservation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Reservation updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/reservations/{id}/status:
    put:
      tags: [Reservations]
      summary: Update reservation status (owner/admin)
      operationId: updateReservationStatus
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReservationStatusRequest"
      responses:
        "200":
          description: Reservation updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/reviews:
    post:
      tags: [Reviews]
      summary: Create a review
      operationId: createReview
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewRequest"
      responses:
        "201":
          description: Review created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/reviews/places/{placeId}:
    get:
      tags: [Reviews]
      summary: List reviews for one place
      operationId: listReviewsByPlace
      parameters:
        - in: path
          name: placeId
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedReviewsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/reviews/establishments/{establishmentId}:
    get:
      tags: [Reviews]
      summary: List reviews for one establishment
      operationId: listReviewsByEstablishment
      parameters:
        - in: path
          name: establishmentId
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated reviews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedReviewsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/reviews/{id}:
    put:
      tags: [Reviews]
      summary: Update one review
      operationId: updateReview
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReviewRequest"
      responses:
        "200":
          description: Review updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Reviews]
      summary: Delete one review
      operationId: deleteReview
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Review deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/search:
    get:
      tags: [Search]
      summary: Search across entities
      operationId: search
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Search result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"

  /api/v1/itineraries:
    get:
      tags: [Itineraries]
      summary: List public itineraries
      operationId: listItineraries
      parameters:
        - in: query
          name: difficulty
          schema:
            type: string
            enum: [facile, modéré, difficile]
        - in: query
          name: duration
          description: Max duration in days
          schema:
            type: integer
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 12
      responses:
        "200":
          description: Paginated list of itineraries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedItinerariesResponse"
    post:
      tags: [Itineraries]
      summary: Create a new itinerary
      operationId: createItinerary
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItineraryRequest"
      responses:
        "201":
          description: Itinerary created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Itinerary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/itineraries/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
    get:
      tags: [Itineraries]
      summary: Get itinerary by ID
      operationId: getItinerary
      responses:
        "200":
          description: Itinerary details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Itinerary"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Itineraries]
      summary: Update an itinerary (owner only)
      operationId: updateItinerary
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItineraryRequest"
      responses:
        "200":
          description: Updated itinerary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Itinerary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Itineraries]
      summary: Delete an itinerary (owner only)
      operationId: deleteItinerary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Itinerary deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/itineraries/{id}/stops:
    post:
      tags: [Itineraries]
      summary: Add a stop to an itinerary
      operationId: addItineraryStop
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddStopRequest"
      responses:
        "201":
          description: Stop added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItineraryStop"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/itineraries/{id}/stops/{stopId}:
    delete:
      tags: [Itineraries]
      summary: Remove a stop from an itinerary
      operationId: deleteItineraryStop
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
        - in: path
          name: stopId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Stop removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteMessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/payments/checkout:
    post:
      tags: [Payments]
      summary: Create a Stripe Checkout session for a reservation
      operationId: createCheckout
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutRequest"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/payments/webhook:
    post:
      tags: [Payments]
      summary: Stripe webhook endpoint
      operationId: stripeWebhook
      description: Receives Stripe events (checkout.session.completed, payment_intent.payment_failed). Verified with Stripe-Signature header.
      parameters:
        - in: header
          name: Stripe-Signature
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Event received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/stats:
    get:
      tags: [Stats]
      summary: Public platform statistics
      operationId: getPublicStats
      responses:
        "200":
          description: Aggregated stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or invalid token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Access denied for current role
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: faso-atlas-api

