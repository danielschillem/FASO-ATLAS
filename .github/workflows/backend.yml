name: Backend CI

on:
  push:
    branches: [main, develop]
    paths: ["backend/**"]
  pull_request:
    branches: [main, develop]
    paths: ["backend/**"]

defaults:
  run:
    working-directory: backend

jobs:
  openapi-validate:
    name: Validate OpenAPI Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint OpenAPI contract
        run: npx @redocly/cli@latest lint backend/openapi/openapi.yaml

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"
          cache-dependency-path: backend/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59
          working-directory: backend

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"
          cache-dependency-path: backend/go.sum

      - name: Run tests
        run: go test ./... -v -race -coverprofile=coverage.out

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"
          cache-dependency-path: backend/go.sum

      - name: Build binary
        run: CGO_ENABLED=0 GOOS=linux go build -o server ./cmd/server

      - name: Build Docker image
        run: docker build -t faso-trip-api:ci .

  smoke-system-endpoints:
    name: Smoke System Endpoints
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: faso_trip
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"
          cache-dependency-path: backend/go.sum

      - name: Start API
        env:
          PORT: 8080
          ENVIRONMENT: development
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/faso_trip?sslmode=disable
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-value-with-at-least-32-chars
          WEB_URL: http://localhost:3000
          APP_VERSION: ci-smoke
          APP_COMMIT: ${{ github.sha }}
          APP_BUILD_DATE: "2026-04-08"
        run: |
          go run ./cmd/server > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for health endpoint
        run: |
          for i in {1..30}; do
            if curl --fail --silent http://localhost:8080/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become healthy in time"
          cat server.log
          exit 1

      - name: Verify system endpoints
        run: |
          curl --fail --silent http://localhost:8080/health | tee health.json
          curl --fail --silent http://localhost:8080/ready | tee ready.json
          curl --fail --silent http://localhost:8080/metrics | tee metrics.txt
          curl --fail --silent http://localhost:8080/openapi.yaml | tee openapi.yaml
          curl --fail --silent http://localhost:8080/version | tee version.json
          grep '"status":"ok"' health.json
          grep '"status":"ready"' ready.json
          grep 'faso_trip_http_requests_total' metrics.txt
          grep 'openapi: 3.0.3' openapi.yaml
          grep '"version":"ci-smoke"' version.json

      - name: Stop API
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi
          if [ -f server.log ]; then
            cat server.log
          fi
